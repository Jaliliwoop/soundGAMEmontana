<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sound Safari: Clinical Pro</title>
    <style>
        :root {
            --bg: #F8F9FA;
            --card: #FFFFFF;
            --primary: #4A90E2;
            --success: #66BB6A;
            --accent: #FF7043;
            --playback: #9575CD;
            --text: #2C3E50;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        #game-app {
            background: var(--card);
            width: 100%; max-width: 480px; height: 95vh;
            border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; position: relative;
            overflow: hidden; border: 4px solid #EEE;
        }

        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; padding: 25px;
            background: white; z-index: 10; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .hidden { transform: translateX(100%); }
        .active { transform: translateX(0); }

        /* --- MENU --- */
        .scroll-area { overflow-y: auto; flex-grow: 1; padding-bottom: 20px; }
        .sound-category { margin-bottom: 15px; border: 2px solid #F0F0F0; border-radius: 15px; overflow: hidden; }
        .category-header { background: #F8F9FA; padding: 12px 20px; font-weight: bold; display: flex; justify-content: space-between; }
        .filter-chip { display: inline-block; padding: 10px 15px; margin: 5px; background: #EEE; border-radius: 20px; cursor: pointer; font-size: 0.9rem; }
        .filter-chip.selected { background: var(--primary); color: white; }

        /* --- GAMEPLAY --- */
        #game-screen { align-items: center; text-align: center; }
        #progress-container { width: 100%; height: 8px; background: #EEE; border-radius: 4px; margin-top: 10px; }
        #progress-bar { height: 100%; background: var(--success); width: 0%; border-radius: 4px; transition: 0.3s; }
        #timer-display { font-weight: bold; color: #999; margin-top: 5px; }

        #word-display { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
        #target-emoji { font-size: 110px; margin-bottom: 10px; transition: 0.3s; }
        #target-word { font-size: 4rem; margin: 0; font-weight: 800; color: #333; }
        .hl { color: var(--accent); text-decoration: underline; }

        /* --- CONTROLS --- */
        .control-box { margin-bottom: 40px; display: flex; flex-direction: column; align-items: center; gap: 15px; width: 100%; }
        #mic-btn { width: 100px; height: 100px; border-radius: 50%; border: none; background: var(--primary); color: white; font-size: 45px; box-shadow: 0 10px 0 #2171C1; cursor: pointer; }
        #mic-btn.active { background: #EF5350; box-shadow: 0 10px 0 #C62828; animation: pulse 1s infinite; }
        
        #playback-btn { background: var(--playback); color: white; border: none; padding: 15px 30px; border-radius: 50px; font-weight: bold; display: none; cursor: pointer; }
        .decision-btns { display: none; gap: 10px; width: 100%; }
        .btn-pass { background: var(--success); color: white; flex: 1; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .btn-retry { background: #BDC3C7; color: white; flex: 1; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        .btn-ready { background: var(--success); color: white; padding: 20px; border-radius: 15px; border: none; font-size: 1.3rem; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        .report-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #EEE; }
    </style>
</head>
<body>

<div id="game-app">
    <div id="menu-screen" class="screen active">
        <h2 style="margin-top:0">Sound Library</h2>
        <p style="color:#666; font-size: 0.9rem;">Select sounds for the timer-tracked session:</p>
        <div class="scroll-area" id="library-list"></div>
        <button class="btn-ready" id="start-btn">Select words</button>
    </div>

    <div id="game-screen" class="screen hidden">
        <div id="progress-container"><div id="progress-bar"></div></div>
        <div id="timer-display">00:00</div>
        <p id="counter">Word 1 of 5</p>

        <div id="word-display">
            <div id="target-emoji">❓</div>
            <h1 id="target-word">Ready?</h1>
            <p id="feedback-msg" style="color:#888; margin-top:20px;">Tap mic & speak</p>
        </div>

        <div class="control-box">
            <button id="mic-btn">🎤</button>
            <button id="playback-btn">▶️ Play My Voice</button>
            <div class="decision-btns" id="decision-area">
                <button class="btn-retry" onclick="app.loadLevel()">Try Again</button>
                <button class="btn-pass" onclick="app.success()">Pass</button>
            </div>
        </div>
    </div>

    <div id="win-screen" class="screen hidden">
        <h1 style="font-size: 3rem; margin-bottom:0">🎉 YAY!</h1>
        <h3 id="final-time-label">Time: 00:00</h3>
        <div class="scroll-area" style="text-align: left; width: 100%;">
            <div class="category-header">Session Summary</div>
            <div id="report-body"></div>
        </div>
        <button class="btn-ready" onclick="location.reload()">New Session</button>
    </div>
</div>

<script>
const soundLibrary = {
    "S": [{w: "Sun", i: "☀️"}, {w: "Soap", i: "🧼"}, {w: "Bus", i: "🚌"}, {w: "Mouse", i: "🐭"}, {w: "Castle", i: "🏰"}],
    "R": [{w: "Robot", i: "🤖"}, {w: "Red", i: "🟥"}, {w: "Car", i: "🚗"}, {w: "Star", i: "⭐"}, {w: "Ring", i: "💍"}],
    "L": [{w: "Lion", i: "🦁"}, {w: "Lamp", i: "💡"}, {w: "Ball", i: "⚽"}, {w: "Bell", i: "🔔"}, {w: "Leaf", i: "🍃"}],
    "CH": [{w: "Chair", i: "🪑"}, {w: "Cheese", i: "🧀"}, {w: "Watch", i: "⌚"}, {w: "Beach", i: "🏖️"}],
    "SH": [{w: "Ship", i: "🚢"}, {w: "Shoe", i: "👞"}, {w: "Fish", i: "🐟"}, {w: "Shell", i: "🐚"}],
    "TH": [{w: "Thumb", i: "👍"}, {w: "Three", i: "3️⃣"}, {w: "Mouth", i: "👄"}, {w: "Bath", i: "🛁"}],
    "K/G": [{w: "Cat", i: "🐱"}, {w: "Key", i: "🔑"}, {w: "Goat", i: "🐐"}, {w: "Dog", i: "🐶"}, {w: "Cup", i: "☕"}]
};

const app = {
    selected: new Set(),
    queue: [],
    idx: 0,
    startTime: null,
    timerInt: null,
    mediaRecorder: null,
    audioChunks: [],
    audioUrl: null,

    init() {
        this.renderLib();
        this.setupSpeech();
        this.setupRecorder();
        document.getElementById('start-btn').onclick = () => this.start();
        document.getElementById('mic-btn').onclick = () => this.toggleMic();
        document.getElementById('playback-btn').onclick = () => new Audio(this.audioUrl).play();
    },

    renderLib() {
        const container = document.getElementById('library-list');
        for (const [key, words] of Object.entries(soundLibrary)) {
            const cat = document.createElement('div');
            cat.className = 'sound-category';
            cat.innerHTML = `<div class="category-header">/${key}/ Sound</div>`;
            const p = document.createElement('div');
            p.style.padding = '10px';
            words.forEach(item => {
                const chip = document.createElement('div');
                chip.className = 'filter-chip';
                chip.innerHTML = `${item.i} ${item.w}`;
                chip.onclick = () => {
                    chip.classList.toggle('selected');
                    if (this.selected.has(item)) this.selected.delete(item);
                    else this.selected.add(item);
                    document.getElementById('start-btn').innerText = `Start (${this.selected.size} words)`;
                };
                p.appendChild(chip);
            });
            cat.appendChild(p);
            container.appendChild(cat);
        }
    },

    async setupRecorder() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            this.mediaRecorder = new MediaRecorder(stream);
            this.mediaRecorder.ondataavailable = (e) => this.audioChunks.push(e.data);
            this.mediaRecorder.onstop = () => {
                const blob = new Blob(this.audioChunks, { type: 'audio/wav' });
                this.audioUrl = URL.createObjectURL(blob);
                document.getElementById('playback-btn').style.display = 'block';
                document.getElementById('decision-area').style.display = 'flex';
                document.getElementById('feedback-msg').innerText = "Listen to your sound!";
            };
        } catch(e) { console.error("Mic access denied"); }
    },

    start() {
        if (this.selected.size === 0) return alert("Select words first!");
        this.queue = Array.from(this.selected);
        this.idx = 0;
        this.startTime = Date.now();
        this.timerInt = setInterval(() => this.updateTimer(), 1000);
        document.getElementById('menu-screen').classList.remove('active');
        document.getElementById('game-screen').classList.add('active');
        this.loadLevel();
    },

    updateTimer() {
        const sec = Math.floor((Date.now() - this.startTime) / 1000);
        const m = Math.floor(sec / 60).toString().padStart(2, '0');
        const s = (sec % 60).toString().padStart(2, '0');
        const timeStr = `${m}:${s}`;
        document.getElementById('timer-display').innerText = timeStr;
        return timeStr;
    },

    loadLevel() {
        const item = this.queue[this.idx];
        document.getElementById('target-emoji').textContent = item.i;
        document.getElementById('target-word').innerHTML = item.w.replace(new RegExp(item.w[0], 'i'), `<span class="hl">$&</span>`);
        document.getElementById('counter').innerText = `Word ${this.idx + 1} of ${this.queue.length}`;
        document.getElementById('progress-bar').style.width = (this.idx / this.queue.length * 100) + "%";
        
        // UI Reset
        document.getElementById('mic-btn').style.display = 'block';
        document.getElementById('playback-btn').style.display = 'none';
        document.getElementById('decision-area').style.display = 'none';
        document.getElementById('feedback-msg').innerText = "Ready to record...";
        this.audioChunks = [];
    },

    toggleMic() {
        if (this.isListening) {
            this.recognition.stop();
            if(this.mediaRecorder.state !== "inactive") this.mediaRecorder.stop();
        } else {
            this.audioChunks = [];
            this.recognition.start();
            this.mediaRecorder.start();
        }
    },

    setupSpeech() {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        this.recognition = new Speech();
        this.recognition.lang = 'en-AU';
        this.recognition.onstart = () => {
            this.isListening = true;
            document.getElementById('mic-btn').classList.add('active');
            document.getElementById('feedback-msg').innerText = "Listening...";
        };
        this.recognition.onend = () => {
            this.isListening = false;
            document.getElementById('mic-btn').classList.remove('active');
        };
        this.recognition.onresult = (e) => {
            const heard = e.results[0][0].transcript.toLowerCase();
            const target = this.queue[this.idx].w.toLowerCase();
            if (heard.includes(target)) {
                if(this.mediaRecorder.state !== "inactive") this.mediaRecorder.stop();
                document.getElementById('mic-btn').style.display = 'none';
            } else {
                document.getElementById('feedback-msg').innerText = `I heard "${heard}"... try again!`;
            }
        };
    },

    success() {
        this.idx++;
        if (this.idx < this.queue.length) this.loadLevel();
        else this.finish();
    },

    finish() {
        clearInterval(this.timerInt);
        document.getElementById('game-screen').classList.remove('active');
        document.getElementById('win-screen').classList.add('active');
        document.getElementById('final-time-label').innerText = "Practice Time: " + document.getElementById('timer-display').innerText;
        
        const report = document.getElementById('report-body');
        this.queue.forEach(item => {
            report.innerHTML += `<div class="report-row"><span>${item.i} ${item.w}</span> <span style="color:green">✔ Done</span></div>`;
        });
    }
};

app.init();
</script>
</body>
</html>
